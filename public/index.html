<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1"/>
  <title>RecycleScan Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    *{box-sizing:border-box;margin:0;padding:0}
    body{font-family:'Inter',system-ui,sans-serif;background:#F0F4F8;overflow-x:hidden}
    @keyframes spin{to{transform:rotate(360deg)}}
    @keyframes modalSlideIn{from{opacity:0;transform:scale(.96) translateY(-20px)}to{opacity:1;transform:scale(1) translateY(0)}}
    input:focus,select:focus,textarea:focus{border-color:#2E7D32!important;box-shadow:0 0 0 3px rgba(46,125,50,.12)}
    button:hover{filter:brightness(1.06)}
    tr:hover{background:#FAFFF9}
  </style>
</head>
<body>
  <div id="root"></div>
</body>
</html>
